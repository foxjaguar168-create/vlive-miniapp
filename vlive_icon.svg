<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradients -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d1e3d"/>
      <stop offset="100%" stop-color="#04090f"/>
    </radialGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffe066"/>
      <stop offset="25%"  stop-color="#c8960c"/>
      <stop offset="50%"  stop-color="#ffe066"/>
      <stop offset="75%"  stop-color="#9a6e00"/>
      <stop offset="100%" stop-color="#ffe066"/>
    </linearGradient>
    <linearGradient id="vLeftGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffe580"/>
      <stop offset="40%"  stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#7a5000"/>
    </linearGradient>
    <linearGradient id="vRightBlue" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a0d4ff"/>
      <stop offset="40%"  stop-color="#2080ff"/>
      <stop offset="100%" stop-color="#0030aa"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffe580"/>
      <stop offset="50%"  stop-color="#c8960c"/>
      <stop offset="100%" stop-color="#ffe580"/>
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a3a6a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a1a3a" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Filters -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#0060ff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#c8960c" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="238"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Candlestick chart (background subtle) -->
  <g clip-path="url(#circleClip)" opacity="0.12">
    <line x1="90"  y1="180" x2="90"  y2="380" stroke="#3060a0" stroke-width="2"/>
    <line x1="110" y1="150" x2="110" y2="380" stroke="#3060a0" stroke-width="2"/>
    <line x1="130" y1="200" x2="130" y2="370" stroke="#3060a0" stroke-width="2"/>
    <line x1="150" y1="160" x2="150" y2="360" stroke="#3060a0" stroke-width="2"/>
    <line x1="170" y1="130" x2="170" y2="350" stroke="#3060a0" stroke-width="2"/>
    <line x1="330" y1="170" x2="330" y2="370" stroke="#3060a0" stroke-width="2"/>
    <line x1="350" y1="140" x2="350" y2="360" stroke="#3060a0" stroke-width="2"/>
    <line x1="370" y1="160" x2="370" y2="380" stroke="#3060a0" stroke-width="2"/>
    <line x1="390" y1="190" x2="390" y2="370" stroke="#3060a0" stroke-width="2"/>
    <line x1="410" y1="210" x2="410" y2="360" stroke="#3060a0" stroke-width="2"/>
  </g>

  <!-- Orbit circle lines -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#orbitGrad)" stroke-width="1.5"/>
  <line x1="256" y1="88" x2="256" y2="424" stroke="#1a3a6a" stroke-width="0.8" opacity="0.4"/>
  <line x1="88"  y1="256" x2="424" y2="256" stroke="#1a3a6a" stroke-width="0.8" opacity="0.4"/>

  <!-- Perspective lines from V bottom -->
  <line x1="256" y1="330" x2="80"  y2="430" stroke="#1a3a6a" stroke-width="0.8" opacity="0.3"/>
  <line x1="256" y1="330" x2="432" y2="430" stroke="#1a3a6a" stroke-width="0.8" opacity="0.3"/>
  <line x1="256" y1="330" x2="256" y2="430" stroke="#1a3a6a" stroke-width="0.8" opacity="0.3"/>

  <!-- V LEFT SIDE - Gold 3D effect -->
  <!-- Shadow layer -->
  <polygon points="138,88 205,88 262,318 235,318" fill="#4a2800" opacity="0.6"/>
  <!-- Main gold -->
  <polygon points="132,82 200,82 258,316 228,316" fill="url(#vLeftGold)" filter="url(#goldGlow)"/>
  <!-- Highlight -->
  <polygon points="132,82 155,82 215,316 228,316" fill="#ffe88a" opacity="0.3"/>

  <!-- V RIGHT SIDE - Blue 3D effect -->
  <!-- Shadow layer -->
  <polygon points="374,88 307,88 250,318 277,318" fill="#001060" opacity="0.6"/>
  <!-- Main blue -->
  <polygon points="380,82 312,82 254,316 284,316" fill="url(#vRightBlue)" filter="url(#blueGlow)"/>
  <!-- Highlight -->
  <polygon points="380,82 356,82 296,316 284,316" fill="#a0d4ff" opacity="0.25"/>

  <!-- V bottom glow -->
  <ellipse cx="256" cy="318" rx="22" ry="6" fill="#0080ff" opacity="0.9" filter="url(#dotGlow)"/>

  <!-- Gold outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#goldRing)" stroke-width="14"/>
  <circle cx="256" cy="256" r="233" fill="none" stroke="#ffe066" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="246" fill="none" stroke="#c8960c" stroke-width="2" opacity="0.2"/>

  <!-- Orbit dots -->
  <!-- Blue dot - top -->
  <circle cx="256" cy="88" r="14" fill="#001880" opacity="0.8"/>
  <circle cx="256" cy="88" r="9"  fill="#4499ff" filter="url(#dotGlow)"/>
  <circle cx="256" cy="88" r="4"  fill="#aaddff"/>

  <!-- Green dot - left -->
  <circle cx="88" cy="256" r="14" fill="#003300" opacity="0.8"/>
  <circle cx="88" cy="256" r="9"  fill="#00cc44" filter="url(#dotGlow)"/>
  <circle cx="88" cy="256" r="4"  fill="#88ffaa"/>

  <!-- Orange dot - right -->
  <circle cx="424" cy="256" r="14" fill="#5a1800" opacity="0.8"/>
  <circle cx="424" cy="256" r="9"  fill="#ff8800" filter="url(#dotGlow)"/>
  <circle cx="424" cy="256" r="4"  fill="#ffcc88"/>

  <!-- VLive text - Gold -->
  <text x="256" y="392"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="58"
        font-weight="bold"
        fill="url(#goldText)"
        filter="url(#textGlow)">VLive</text>

  <!-- Gold diamond divider -->
  <polygon points="256,405 262,412 256,419 250,412" fill="#c8960c"/>
  <line x1="160" y1="412" x2="244" y2="412" stroke="#c8960c" stroke-width="1" opacity="0.5"/>
  <line x1="268" y1="412" x2="352" y2="412" stroke="#c8960c" stroke-width="1" opacity="0.5"/>

  <!-- SYSTEM text -->
  <text x="256" y="446"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="bold"
        letter-spacing="10"
        fill="#e0e8ff"
        opacity="0.95">SYSTEM</text>
</svg>
